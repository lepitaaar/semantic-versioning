name: Tag on PR Merge (frontend/backend)

on:
  pull_request:
    # types: [opened]
    branches: [main]

permissions:
  contents: write
  pull-requests: read

jobs:
  tag:
    # if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Read PR labels
        id: labels
        run: |
          labels='${{ toJson(github.event.pull_request.labels) }}'
          echo "labels: $labels"

          # 어떤 서비스 태그를 만들지(복수 가능)
          front="false"
          back="false"
          echo "$labels" | grep -q '"name": "fe"' && front="true" || true
          echo "$labels" | grep -q '"name": "be"' && back="true" || true

          # bump 타입(우선순위: major > minor > patch)
          bump=""
          echo "$labels" | grep -q '"name": "major"' && bump="major" || true
          if [ -z "$bump" ]; then
            echo "$labels" | grep -q '"name": "minor"' && bump="minor" || true
          fi
          if [ -z "$bump" ]; then
            echo "$labels" | grep -q '"name": "patch"' && bump="patch" || true
          fi

          echo "front=$front" >> $GITHUB_OUTPUT
          echo "back=$back" >> $GITHUB_OUTPUT
          echo "bump=$bump" >> $GITHUB_OUTPUT

      - name: Compute & push tag(s)
        run: |
          bump="${{ steps.labels.outputs.bump }}"

          bump_tag () {
            prefix="$1"   # frontend or backend
            # 해당 prefix의 최신 태그만 따로 본다: frontend/vX.Y.Z
            latest_tag=$(git tag -l "${prefix}/v*" --sort=-v:refname | head -n 1)
            [ -z "$latest_tag" ] && latest_tag="${prefix}/v0.0.0"

            current_version=${latest_tag#${prefix}/v}
            IFS='.' read -r major minor patch <<< "$current_version"

            case "$bump" in
              major) new_version="$((major + 1)).0.0" ;;
              minor) new_version="${major}.$((minor + 1)).0" ;;
              patch) new_version="${major}.${minor}.$((patch + 1))" ;;
            esac

            new_tag="${prefix}/v${new_version}"
            echo "Creating tag: $new_tag (from $latest_tag, bump=$bump)"
            git tag "$new_tag"
            git push origin "$new_tag"
          }

          if [ "${{ steps.labels.outputs.front }}" != "true" ] && [ "${{ steps.labels.outputs.back }}" != "true" ]; then
            echo "⚠️ No service label (fe/be) found. Skipping."
            exit 0
          fi

          if [ -z "$bump" ]; then
            echo "⚠️ No bump label (major/minor/patch) found. Skipping."
            exit 0
          fi

          if [ "${{ steps.labels.outputs.front }}" = "true" ]; then
            bump_tag "frontend"
          fi

          if [ "${{ steps.labels.outputs.back }}" = "true" ]; then
            bump_tag "backend"
          fi
